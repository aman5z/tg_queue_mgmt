<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{DISPLAY_TITLE}}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon_tv.svg" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <button id="fullscreen-btn" class="tts-settings-btn left" aria-label="Toggle fullscreen">⛶</button>
  <button id="tts-settings-btn" class="tts-settings-btn" aria-label="Open TTS settings">⚙️</button>
  <div id="tts-overlay" class="tts-overlay hidden">
    <div class="tts-panel">
      <h3>TTS Settings</h3>
      <div class="form-group">
        <label for="display-theme">Theme</label>
        <select id="display-theme">
          <option value="dark">Dark</option>
          <option value="midnight">Midnight</option>
          <option value="light">Light</option>
          <option value="red">Red Alert</option>
          <option value="green">Matrix</option>
        </select>
      </div>
      <div class="form-group">
        <label for="tts-lang-filter">Language filter</label>
        <input type="text" id="tts-lang-filter" placeholder="Filter by language, e.g. en, ms, ar" />
      </div>
      <div class="form-group">
        <label for="tts-voice">Voice</label>
        <select id="tts-voice"></select>
      </div>
      <div class="form-group">
        <label for="tts-rate">Rate <span id="tts-rate-value">0.9</span></label>
        <input type="range" id="tts-rate" min="0.5" max="1.5" step="0.1" value="0.9" />
      </div>
      <div class="form-group">
        <label for="tts-pitch">Pitch <span id="tts-pitch-value">1</span></label>
        <input type="range" id="tts-pitch" min="0.5" max="2" step="0.1" value="1" />
      </div>
      <div class="form-group">
        <label for="tts-volume">Volume <span id="tts-volume-value">1</span></label>
        <input type="range" id="tts-volume" min="0" max="1" step="0.1" value="1" />
      </div>
      <div class="tts-actions">
        <button id="tts-test-btn" class="btn-primary" type="button">Test Voice</button>
        <button id="tts-close-btn" class="btn-secondary" type="button">Close</button>
      </div>
    </div>
  </div>
  <header>
    <div id="clock"></div>
    <h1>{{DISPLAY_TITLE}}</h1>
    <div id="weather-info" style="font-size:0.9rem;color:var(--muted);text-align:right;min-width:16ch;"></div>
  </header>

  <main>
    <!-- NOW SERVING banner -->
    <section id="now-serving-section">
      <div class="label">NOW SERVING</div>
      <div id="token-number">—</div>
      <div id="counter-name"></div>
      <div id="customer-name"></div>
    </section>

    <!-- Per-counter status grid -->
    <section id="counters-section">
      <h2>Counters</h2>
      <div id="counters-grid"></div>
    </section>

    <!-- Waiting list -->
    <section id="waiting-section">
      <h2>Waiting</h2>
      <div id="waiting-list"></div>
    </section>
  </main>

  <script>
    // -----------------------------------------------------------------------
    // Clock
    // -----------------------------------------------------------------------
    function updateClock() {
      const now = new Date();
      const dateLine = now.toLocaleDateString(undefined, {
        weekday: 'long',
        day: '2-digit',
        month: 'long',
        year: 'numeric',
      });
      const timeLine = now.toLocaleTimeString(undefined, {
        hour: '2-digit',
        minute: '2-digit',
        second: '2-digit',
      });
      document.getElementById('clock').textContent = `${dateLine}\n${timeLine}`;
    }
    setInterval(updateClock, 1000);
    updateClock();

    const WMO_ICONS = {
      0: '☀️', 1: '🌤️', 2: '⛅', 3: '🌥️', 45: '🌫️', 48: '🌫️', 51: '🌦️', 53: '🌦️', 55: '🌦️',
      61: '🌧️', 63: '🌧️', 65: '🌧️', 71: '❄️', 73: '❄️', 75: '❄️', 80: '🌧️', 81: '🌧️', 82: '🌧️', 95: '⛈️'
    };
    async function fetchWeather() {
      if (!navigator.geolocation) return;
      navigator.geolocation.getCurrentPosition(async pos => {
        const { latitude: lat, longitude: lon } = pos.coords;
        try {
          const r = await fetch(`https://api.open-meteo.com/v1/forecast?latitude=${lat}&longitude=${lon}&current_weather=true`);
          const d = await r.json();
          const w = d.current_weather;
          const icon = WMO_ICONS[w.weathercode] || '🌡️';
          document.getElementById('weather-info').textContent = `${icon} ${w.temperature}°C`;
        } catch (_) {}
      }, () => {});
    }
    fetchWeather();
    setInterval(fetchWeather, 10 * 60 * 1000);

    // -----------------------------------------------------------------------
    // Beep (base64-encoded minimal WAV — a short 440 Hz sine tone)
    // -----------------------------------------------------------------------
    const BEEP_B64 =
      'UklGRlQAAABXQVZFZm10IBAAAAABAAEARKwAAIhYAQACABAAZGF0YTAAAAB/' +
      'f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/f39/fw==';

    function playBeep() {
      try {
        const audio = new Audio('data:audio/wav;base64,' + BEEP_B64);
        audio.play().catch(() => {});
      } catch (_) {}
    }

    // -----------------------------------------------------------------------
    // TTS Settings + TTS
    // -----------------------------------------------------------------------
    const DEFAULT_TTS_RATE = '0.9';
    const DEFAULT_TTS_PITCH = '1';
    const DEFAULT_TTS_VOLUME = '1';
    const DEFAULT_THEME = 'dark';
    let allVoices = [];

    function setDefaultTtsSettings() {
      if (!localStorage.getItem('tts_rate')) localStorage.setItem('tts_rate', DEFAULT_TTS_RATE);
      if (!localStorage.getItem('tts_pitch')) localStorage.setItem('tts_pitch', DEFAULT_TTS_PITCH);
      if (!localStorage.getItem('tts_volume')) localStorage.setItem('tts_volume', DEFAULT_TTS_VOLUME);
    }

    function restoreTtsSettingsUI() {
      setDefaultTtsSettings();
      const rate = localStorage.getItem('tts_rate') || DEFAULT_TTS_RATE;
      const pitch = localStorage.getItem('tts_pitch') || DEFAULT_TTS_PITCH;
      const volume = localStorage.getItem('tts_volume') || DEFAULT_TTS_VOLUME;
      document.getElementById('tts-rate').value = rate;
      document.getElementById('tts-pitch').value = pitch;
      document.getElementById('tts-volume').value = volume;
      document.getElementById('tts-rate-value').textContent = rate;
      document.getElementById('tts-pitch-value').textContent = pitch;
      document.getElementById('tts-volume-value').textContent = volume;
    }

    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      localStorage.setItem('display_theme', theme);
      const select = document.getElementById('display-theme');
      if (select) select.value = theme;
    }

    function restoreTheme() {
      const theme = localStorage.getItem('display_theme') || DEFAULT_THEME;
      applyTheme(theme);
    }

    function saveSliderSetting(key, valueId, value) {
      localStorage.setItem(key, value);
      document.getElementById(valueId).textContent = value;
    }

    function renderVoiceOptions() {
      const select = document.getElementById('tts-voice');
      const filter = (document.getElementById('tts-lang-filter').value || '').trim().toLowerCase();
      const selected = localStorage.getItem('tts_voice') || '';
      const filtered = allVoices.filter(v => !filter || (v.lang || '').toLowerCase().includes(filter));
      select.innerHTML = '';
      filtered.forEach(v => {
        const opt = document.createElement('option');
        opt.value = v.name;
        opt.textContent = `${v.name} (${v.lang})`;
        if (v.name === selected) opt.selected = true;
        select.appendChild(opt);
      });
      if (!select.value && filtered.length) {
        select.value = filtered[0].name;
        localStorage.setItem('tts_voice', filtered[0].name);
      }
    }

    function loadVoices() {
      if (!window.speechSynthesis) return;
      allVoices = window.speechSynthesis.getVoices();
      renderVoiceOptions();
    }

    function speak(text) {
      if (!window.speechSynthesis) return;
      window.speechSynthesis.cancel();
      const utt = new SpeechSynthesisUtterance(text);
      const savedVoiceName = localStorage.getItem('tts_voice');
      const voices = window.speechSynthesis.getVoices();
      if (savedVoiceName) {
        const v = voices.find(v => v.name === savedVoiceName);
        if (v) utt.voice = v;
      }
      utt.rate = parseFloat(localStorage.getItem('tts_rate') || DEFAULT_TTS_RATE);
      utt.pitch = parseFloat(localStorage.getItem('tts_pitch') || DEFAULT_TTS_PITCH);
      utt.volume = parseFloat(localStorage.getItem('tts_volume') || DEFAULT_TTS_VOLUME);
      window.speechSynthesis.speak(utt);
    }

    // -----------------------------------------------------------------------
    // State
    // -----------------------------------------------------------------------
    let lastToken = null;
    let lastCalled = null;

    function renderCounters(counters) {
      const grid = document.getElementById('counters-grid');
      grid.innerHTML = '';
      counters.forEach(c => {
        const card = document.createElement('div');
        card.className = 'counter-card ' + (c.status === 'open' ? 'open' : 'closed');
        card.innerHTML =
          `<div class="counter-title">${escHtml(c.name)}</div>` +
          `<div class="counter-token">${c.current_token !== null ? '#' + c.current_token : '—'}</div>` +
          `<div class="counter-status">${c.status.toUpperCase()}</div>`;
        grid.appendChild(card);
      });
    }

    function renderWaiting(counters) {
      const list = document.getElementById('waiting-list');
      list.innerHTML = '';
      counters.forEach(c => {
        if (!c.waiting || c.waiting.length === 0) return;
        const sec = document.createElement('div');
        sec.className = 'waiting-counter';
        sec.innerHTML = `<div class="waiting-counter-name">${escHtml(c.name)}</div>`;
        const ul = document.createElement('ul');
        c.waiting.slice(0, 10).forEach(t => {
          const li = document.createElement('li');
          li.textContent = `#${t.token_number}` + (t.customer_name ? ` — ${t.customer_name}` : '');
          ul.appendChild(li);
        });
        if (c.waiting_count > 10) {
          const li = document.createElement('li');
          li.textContent = `…and ${c.waiting_count - 10} more`;
          ul.appendChild(li);
        }
        sec.appendChild(ul);
        list.appendChild(sec);
      });
      if (!list.children.length) {
        list.innerHTML = '<p class="empty">No one waiting.</p>';
      }
    }

    function renderNowServing(lastCalled) {
      if (!lastCalled) {
        document.getElementById('token-number').textContent = '—';
        document.getElementById('counter-name').textContent = '';
        document.getElementById('customer-name').textContent = '';
        return;
      }
      document.getElementById('token-number').textContent = '#' + lastCalled.token;
      document.getElementById('counter-name').textContent =
        'at ' + (lastCalled.counter || '');
      document.getElementById('customer-name').textContent =
        lastCalled.customer_name ? lastCalled.customer_name : '';
    }

    function escHtml(str) {
      return String(str)
        .replace(/&/g, '&amp;')
        .replace(/</g, '&lt;')
        .replace(/>/g, '&gt;');
    }

    function onData(data) {
      const lc = data.last_called;
      const tokenChanged =
        lc &&
        (!lastCalled ||
          lc.token !== lastCalled.token ||
          lc.counter !== lastCalled.counter ||
          lc.called_at !== lastCalled.called_at);

      renderNowServing(lc);
      renderCounters(data.counters || []);
      renderWaiting(data.counters || []);

      if (tokenChanged) {
        lastCalled = lc;
        playBeep();
        speak(
          `Token number ${lc.token}, please proceed to ${lc.counter}`
        );
        // Flash animation
        const ns = document.getElementById('now-serving-section');
        ns.classList.add('flash');
        setTimeout(() => ns.classList.remove('flash'), 1500);
      }
    }

    // -----------------------------------------------------------------------
    // SSE connection with auto-reconnect
    // -----------------------------------------------------------------------
    function connect() {
      const es = new EventSource('/events');
      es.onmessage = (e) => {
        try {
          const data = JSON.parse(e.data);
          onData(data);
        } catch (_) {}
      };
      es.onerror = () => {
        es.close();
        setTimeout(connect, 3000);
      };
    }
    restoreTtsSettingsUI();
    loadVoices();
    if (window.speechSynthesis) {
      window.speechSynthesis.onvoiceschanged = loadVoices;
    }

    document.getElementById('tts-settings-btn').addEventListener('click', () => {
      document.getElementById('tts-overlay').classList.remove('hidden');
    });
    document.getElementById('fullscreen-btn').addEventListener('click', async () => {
      if (!document.fullscreenElement) {
        await document.documentElement.requestFullscreen();
      } else {
        await document.exitFullscreen();
      }
    });
    document.getElementById('tts-close-btn').addEventListener('click', () => {
      document.getElementById('tts-overlay').classList.add('hidden');
    });
    document.getElementById('display-theme').addEventListener('change', (e) => {
      applyTheme(e.target.value);
    });
    document.getElementById('tts-lang-filter').addEventListener('input', renderVoiceOptions);
    document.getElementById('tts-voice').addEventListener('change', (e) => {
      localStorage.setItem('tts_voice', e.target.value);
    });
    document.getElementById('tts-rate').addEventListener('input', (e) => {
      saveSliderSetting('tts_rate', 'tts-rate-value', e.target.value);
    });
    document.getElementById('tts-pitch').addEventListener('input', (e) => {
      saveSliderSetting('tts_pitch', 'tts-pitch-value', e.target.value);
    });
    document.getElementById('tts-volume').addEventListener('input', (e) => {
      saveSliderSetting('tts_volume', 'tts-volume-value', e.target.value);
    });
    document.getElementById('tts-test-btn').addEventListener('click', () => {
      speak('Token number 5, please proceed to Counter A');
    });
    restoreTheme();
    connect();
  </script>
</body>
</html>
