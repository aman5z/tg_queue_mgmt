<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{{TAKE_TITLE}}</title>
  <link rel="icon" type="image/svg+xml" href="/static/favicon_ticket.svg" />
  <link rel="stylesheet" href="/static/style.css" />
</head>
<body>
  <div class="form-page">
    <div class="form-card">
      <h1>{{TAKE_TITLE}}</h1>

      <form id="token-form">
        <div class="form-group">
          <label for="name">Your Name *</label>
          <input type="text" id="name" name="name" placeholder="Enter your name" required />
        </div>

        <div class="form-group">
          <label for="department">
            Department / Counter *
            <span id="counter-status-hint" style="font-size:0.75rem;color:#aaa;margin-left:0.4rem;"></span>
          </label>
          <select id="department" name="department" required>
            <option value="">— Loading counters… —</option>
          </select>
        </div>

        <div class="form-group">
          <label for="purpose">Purpose (optional)</label>
          <textarea id="purpose" name="purpose" rows="2" placeholder="What is this visit for?"></textarea>
        </div>

        <button type="submit" class="btn-primary" id="submit-btn">Get Token</button>
      </form>

      <div id="result" class="token-result" style="display:none">
        <div class="big-number" id="result-token">—</div>
        <div class="hint">Your token number</div>
        <p id="result-counter" style="margin-top:0.7rem;color:#aaa;"></p>
        <p style="margin-top:1.5rem;">
          <a id="track-link" href="#" style="color:#f0c040;font-weight:700;">
            📍 Track your token live
          </a>
        </p>
      </div>
    </div>
  </div>

  <script>
    let _counters = [];
    let _refreshInterval = null;

    // Load counters and populate the dropdown.
    // Keeps the user's current selection if it's still valid.
    async function loadCounters() {
      const sel = document.getElementById('department');
      const previousValue = sel.value;

      try {
        const res = await fetch('/api/counters');
        if (!res.ok) throw new Error('HTTP ' + res.status);
        _counters = await res.json();

        // Rebuild options
        sel.innerHTML = '';
        const placeholder = document.createElement('option');
        placeholder.value = '';
        placeholder.textContent = '— Select department —';
        sel.appendChild(placeholder);

        let openCount = 0;
        _counters.forEach(c => {
          const opt = document.createElement('option');
          opt.value = c.id;
          const isOpen = c.status === 'open';
          if (isOpen) {
            opt.textContent = c.name;
            openCount++;
          } else {
            opt.textContent = c.name + ' (closed)';
            opt.disabled = true;
            opt.style.color = '#888';
          }
          sel.appendChild(opt);
        });

        // Restore previous selection if still open
        if (previousValue) {
          const stillOpen = _counters.find(
            c => String(c.id) === String(previousValue) && c.status === 'open'
          );
          sel.value = stillOpen ? previousValue : '';
        }

        // Status hint
        const hint = document.getElementById('counter-status-hint');
        if (_counters.length === 0) {
          hint.textContent = '(no counters configured)';
        } else if (openCount === 0) {
          hint.textContent = '(all counters closed — please wait)';
        } else {
          hint.textContent = `(${openCount} open)`;
        }

      } catch (err) {
        console.error('Failed to load counters:', err);
        sel.innerHTML = '<option disabled>Error loading — retrying…</option>';
      }
    }

    // Initial load + auto-refresh every 5 seconds
    loadCounters();
    _refreshInterval = setInterval(loadCounters, 5000);

    document.getElementById('token-form').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('submit-btn');
      btn.disabled = true;
      btn.textContent = 'Processing…';

      const name = document.getElementById('name').value.trim();
      const counter_id = document.getElementById('department').value;
      const purpose = document.getElementById('purpose').value.trim();

      try {
        const res = await fetch('/api/token', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ name, counter_id, purpose }),
        });
        const data = await res.json();
        if (data.error) {
          alert('Error: ' + data.error);
          btn.disabled = false;
          btn.textContent = 'Get Token';
          return;
        }

        // Stop refreshing the dropdown once a token is taken
        clearInterval(_refreshInterval);

        const sel = document.getElementById('department');
        const counterName = sel.options[sel.selectedIndex].text;

        document.getElementById('result-token').textContent = '#' + data.token_number;
        document.getElementById('result-counter').textContent = 'Counter: ' + counterName;
        document.getElementById('track-link').href = '/track/' + data.token_id;
        document.getElementById('token-form').style.display = 'none';
        document.getElementById('result').style.display = 'block';
      } catch (err) {
        alert('Network error. Please try again.');
        btn.disabled = false;
        btn.textContent = 'Get Token';
      }
    });
  </script>
</body>
</html>
